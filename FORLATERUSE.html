<div class="FORLATERUSE">
  <div class="container">
    <div class="bg-white shadow rounded-4 p-4 mx-auto" style="max-width: 950px">
      <form>
        <div class="row g-3">
          <!-- Location -->
          <div class="col-lg-6">
            <label class="form-label">Location</label>

            <div class="input-group">
              <span class="input-group-text bg-white">
                <i class="fa-solid fa-location-dot"></i>
              </span>

              <input
                type="text"
                class="form-control"
                placeholder="Enter city, neighborhood, or ZIP code"
              />
            </div>
          </div>

          <!-- Property Type -->
          <div class="col-lg-3">
            <label class="form-label">Property Type</label>

            <select class="form-select">
              <option>All Types</option>
              <option>Apartment</option>
              <option>House</option>
              <option>Villa</option>
            </select>
          </div>

          <!-- Price -->
          <div class="col-lg-3">
            <label class="form-label">Price Range</label>

            <select class="form-select">
              <option>Any Price</option>
              <option>$100k - $300k</option>
              <option>$300k - $500k</option>
            </select>
          </div>

          <!-- Bedrooms -->
          <div class="col-md-3">
            <label class="form-label">Bedrooms</label>

            <select class="form-select">
              <option>Any</option>
              <option>1+</option>
              <option>2+</option>
              <option>3+</option>
              <option>4+</option>
            </select>
          </div>

          <!-- Bathrooms -->
          <div class="col-md-3">
            <label class="form-label">Bathrooms</label>

            <select class="form-select">
              <option>4+</option>
            </select>
          </div>

          <!-- Min Sq Ft -->
          <div class="col-md-3">
            <label class="form-label">Min Sq Ft</label>

            <input type="number" class="form-control" placeholder="1000" />
          </div>

          <!-- Max Sq Ft -->
          <div class="col-md-3">
            <label class="form-label">Max Sq Ft</label>

            <input type="number" class="form-control" placeholder="0" />
          </div>

          <!-- Button -->
          <div class="col-12">
            <button class="btn btn-primary w-100 py-3 rounded-3">
              <i class="fa-solid fa-magnifying-glass me-2"></i>
              Search Properties
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
